<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Processor V4.7 | 3rd - Party Invoicing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        /* Updated Styles for Logistics Processor */
body { 
    background-color: #0f1115; 
    font-family: 'Inter', 'Segoe UI', sans-serif; 
    color: #e2e8f0;
    margin: 0;
    padding: 2rem;
}

.card { 
    background: #1a1d23;
    border: 1px solid #2d333b; 
    border-radius: 4px; /* Sharper edges for a professional look */
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); 
    padding: 1.5rem;
}

.drop-zone { 
    border: 2px dashed #38bdf8; /* Uses the cyan accent color */
    border-radius: 4px; 
    padding: 40px; 
    text-align: center; 
    background: #14171c; 
    color: #94a3b8;
    cursor: pointer; 
    transition: all 0.2s ease;
}

.drop-zone:hover {
    background: #1a1d23;
    border-color: #7dd3fc;
    color: #e2e8f0;
}

.log-container { 
    background: #000000; /* Deep black for high-contrast logs */
    color: #4ade80; 
    padding: 15px; 
    border-radius: 4px; 
    height: 350px; 
    overflow-y: auto; 
    font-family: 'Fira Code', monospace; /* "Fira Code" or "Consolas" for data density */
    font-size: 0.8rem; 
    border: 1px solid #2d333b;
    line-height: 1.4;
}

.config-section { 
    background: #14171c; 
    padding: 15px; 
    border-radius: 4px; 
    border: 1px solid #2d333b;
    margin-bottom: 20px; 
}

.config-label { 
    font-size: 0.75rem; 
    text-transform: uppercase; 
    letter-spacing: 0.05em;
    font-weight: 600; 
    color: #8c9fbb;
    margin-top: 10px; 
}

.config-value { 
    font-weight: bold; 
    color: #38bdf8; /* Accent color consistency */
    font-size: 0.9rem;
}
        
        /* Enhanced slider styling */
        .form-range {
            height: 8px;
            border-radius: 5px;
        }
        
        .form-range::-webkit-slider-track {
            background: linear-gradient(to right, #0d6efd 0%, #0d6efd 100%);
            border-radius: 5px;
            height: 8px;
            border: none;
        }
        
        .form-range::-moz-range-track {
            background: linear-gradient(to right, #0d6efd 0%, #0d6efd 100%);
            border-radius: 5px;
            height: 8px;
            border: none;
        }
        
        .form-range::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 3px solid #0d6efd;
            cursor: pointer;
            margin-top: -6px;
        }
        
        .form-range::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 3px solid #0d6efd;
            cursor: pointer;
        }
        
        .form-range::-moz-range-progress {
            background: #0d6efd;
            border-radius: 5px;
            height: 8px;
        }

        .back-btn {
    position: fixed;
    top: 1.5rem;
    left: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    
    /* Colors matching your existing palette */
    color: #94a3b8; 
    background: #1a1d23;
    border: 1px solid #2d333b;
    border-radius: 4px;
    
    padding: 0.5rem 0.8rem;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.2s ease-in-out;
    z-index: 1000; /* Keeps it above logs and cards */
}

.back-btn:hover {
    border-color: #38bdf8; /* Accent color */
    color: #e2e8f0;
    background: #1e252e;
    transform: translateX(-2px);
}

.back-btn svg {
    transition: transform 0.2s ease;
}

.back-btn:hover svg {
    transform: translateX(-3px);
}

/* Add a bit of top padding to your main container 
   to ensure the button doesn't overlap your header */
.container {
    margin-top: 2rem;
}

    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span>Dashboard</span>
</a>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card p-4">
                <h3 class="text-primary mb-4">Logistics Processor V4.7</h3>
                
                <!-- CONFIG SECTION -->
                <div class="config-section">
                    <h5 class="text-secondary mb-3">⚙️ Fuzzy Match Settings</h5>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="config-label">Customer Name Similarity</div>
                            <input type="range" id="nameThreshold" class="form-range" min="0.5" max="1.0" step="0.01" value="0.88">
                            <small class="config-value" id="nameValue">0.88</small>
                        </div>
                        <div class="col-md-4">
                            <div class="config-label">Address Similarity</div>
                            <input type="range" id="addressThreshold" class="form-range" min="0.5" max="1.0" step="0.01" value="0.85">
                            <small class="config-value" id="addressValue">0.85</small>
                        </div>
                        <div class="col-md-4">
                            <div class="config-label">Distance Threshold (km)</div>
                            <input type="range" id="distanceThreshold" class="form-range" min="0" max="50" step="1" value="10">
                            <small class="config-value" id="distanceValue">10</small>
                        </div>
                    </div>
                </div>
                
                <div id="dropZone" class="drop-zone mb-4">
                    <h5>Drop Manifest Here</h5>
                    <p class=" mb-0">Please upload your .xlsx file</p>
                    <input type="file" id="fileInput" accept=".xlsx, .xls" hidden>
                </div>
                <div class="d-flex gap-3 mb-4">
                    <button id="processBtn" class="btn btn-success btn-lg flex-grow-1" disabled>Generate Processed File</button>
                    <button id="templateBtn" class="btn btn-outline-primary btn-lg flex-grow-1">Download Template</button>
                </div>
                <div id="log" class="log-container">Ready.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Fuzzy match configuration
    const config = {
        nameThreshold: 0.88,
        addressThreshold: 0.85,
        distanceThreshold: 10
    };

    // Helper to format Excel Dates or String Dates to YYYY-MM-DD
    function formatToShortDate(val) {
        if (!val) return "";
        let d = new Date(val);
        // Check if date is valid
        if (isNaN(d.getTime())) return String(val).split(' ')[0]; 
        return d.toISOString().split('T')[0];
    }

    function compareStrings(a, b) {
        a = String(a || "").toLowerCase().trim(); b = String(b || "").toLowerCase().trim();
        if (!a || !b) return 0; if (a === b) return 1;
        let map = new Map();
        for (let i = 0; i < a.length - 1; i++) { let bi = a.substring(i, i + 2); map.set(bi, (map.get(bi) || 0) + 1); }
        let intersect = 0;
        for (let i = 0; i < b.length - 1; i++) { let bi = b.substring(i, i + 2); if (map.get(bi) > 0) { map.set(bi, map.get(bi) - 1); intersect++; } }
        return (2.0 * intersect) / (a.length + b.length - 2);
    }

    function calculateConfidence(matchType, cSim) {
        if (matchType === "Name/Addr") return 0.95 + (cSim * 0.05);
        if (matchType === "Name/Dist") return 0.90 + (cSim * 0.05);
        return 1.0;
    }

    const logBox = document.getElementById('log');
    const log = (msg) => {
        const d = document.createElement('div');
        d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.appendChild(d);
        logBox.scrollTop = logBox.scrollHeight;
    };

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const processBtn = document.getElementById('processBtn');
    let rawData = null;

    // CONFIG EVENT LISTENERS
    document.getElementById('nameThreshold').oninput = (e) => {
        config.nameThreshold = parseFloat(e.target.value);
        document.getElementById('nameValue').textContent = e.target.value;
    };

    document.getElementById('addressThreshold').oninput = (e) => {
        config.addressThreshold = parseFloat(e.target.value);
        document.getElementById('addressValue').textContent = e.target.value;
    };

    document.getElementById('distanceThreshold').oninput = (e) => {
        config.distanceThreshold = parseFloat(e.target.value);
        document.getElementById('distanceValue').textContent = e.target.value;
    };

    // 1. CLICK TO UPLOAD
    dropZone.onclick = () => fileInput.click();

    // 2. DRAG & DROP HANDLERS
    ['dragover', 'dragenter'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.style.borderColor = "#198754";
            dropZone.style.background = "#f8fffb";
        });
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.style.borderColor = "#0d6efd";
            dropZone.style.background = "white";
        });
    });

    // 3. HANDLE THE DROP ACTION
    dropZone.addEventListener('drop', (e) => {
        const droppedFiles = e.dataTransfer.files;
        if (droppedFiles.length > 0) {
            handleFile(droppedFiles[0]); 
        }
    });

    // 4. HANDLE MANUAL SELECTION (CLICK)
    fileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            handleFile(e.target.files[0]);
        }
    };

    // 5. THE CORE PROCESSING FUNCTION
    function handleFile(file) {
        log(`File detected: ${file.name}`);
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const data = new Uint8Array(event.target.result);
                const wb = XLSX.read(data, { type: 'array', cellDates: true });
                rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                if (rawData.length === 0) {
                    log("Error: File is empty");
                    processBtn.disabled = true;
                    return;
                }
                
                log(`Successfully loaded ${rawData.length} rows.`);
                log(`Config: Name=${config.nameThreshold} | Address=${config.addressThreshold} | Distance=${config.distanceThreshold}km`);
                processBtn.disabled = false;
            } catch (err) {
                log(`Error reading file: ${err.message}`);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    processBtn.onclick = async () => {
        processBtn.disabled = true;
        log("Step 1: Normalizing dates and cleaning IDs...");
        
        const seen = new Set();
        const cleanedData = [];

        rawData.forEach((row) => {
            const refSource = row.Shipper_Ref || row.External_ID || "";
            const cleanID = String(refSource).replace(/\.0$/, "").trim();

            if (cleanID && !seen.has(cleanID)) {
                seen.add(cleanID);
                cleanedData.push({
                    ...row,
                    _internalID: cleanID,
                    _isIBT: cleanID.startsWith('46'),
                    _shortDate: formatToShortDate(row.Booking_Date),
                    _tripID: String(row.ID || ""),
                    _dist: parseFloat(row.Delivery_Distance || 0),
                    _weight: parseFloat(row.Delivery_Weight || 0),
                    _customer: String(row.Customer || ""),
                    _address: String(row.To_Location || ""),
                    _driverAddr: String(row.Driver_Address || "Unassigned")
                });
            }
        });

        log(`Step 2: Grouping ${cleanedData.length} records by Short Date...`);
        const processedRefs = new Set();
        const groupedResults = [];

        for (let i = 0; i < cleanedData.length; i++) {
            const p = cleanedData[i];
            if (processedRefs.has(p._internalID)) continue;

            let group = { 
                ...p, 
                subInvoices: [], 
                subTrips: [], 
                totalW: p._weight, 
                reason: "Unique delivery", 
                confValue: 1.0 
            };
            processedRefs.add(p._internalID);

            for (let j = i + 1; j < cleanedData.length; j++) {
                const c = cleanedData[j];
                if (processedRefs.has(c._internalID)) continue;

                let isMatch = false;
                let matchType = "";

                if (p._shortDate === c._shortDate) {
                    if (!p._isIBT && !c._isIBT) {
                        const cSim = compareStrings(p._customer, c._customer);
                        const aSim = compareStrings(p._address, c._address);
                        const dDiff = Math.abs(p._dist - c._dist);
                        const companyMatch = p._driverAddr === c._driverAddr;

                        if (companyMatch && cSim > config.nameThreshold && aSim > config.addressThreshold) { isMatch = true; matchType = "Company/Name/Addr"; } 
                        else if (cSim > config.nameThreshold && aSim > config.addressThreshold) { isMatch = true; matchType = "Name/Addr"; } 
                        else if (cSim > config.nameThreshold && dDiff <= config.distanceThreshold) { isMatch = true; matchType = "Name/Dist"; }
                    } else if (p._isIBT && c._isIBT) {
                        if (p.Sending_Store && c.Sending_Store &&
                            p.Sending_Store === c.Sending_Store && 
                            p.Receiving_Store === c.Receiving_Store) {
                            isMatch = true; matchType = "IBT Route";
                        }
                    }
                }

                if (isMatch) {
                    group.subInvoices.push(c._internalID);
                    group.subTrips.push(c._tripID);
                    group.totalW += c._weight;
                    group.reason = `Grouped via ${matchType}`;
                    group.confValue = calculateConfidence(matchType, cSim);
                    processedRefs.add(c._internalID);
                }
            }
            groupedResults.push(group);
            if (i % 100 === 0) await new Promise(r => setTimeout(r, 0));
        }

        log("Step 3: Building Final Excel...");
        const wb = new ExcelJS.Workbook();
        const rawSheet = wb.addWorksheet('raw data');
        const allHeaders = Object.keys(rawData[0]);
        rawSheet.addRow(allHeaders);
        cleanedData.forEach(r => rawSheet.addRow(allHeaders.map(h => r[h])));

        const companies = [...new Set(groupedResults.map(g => g._driverAddr))];
        
        for (const company of companies) {
            const sheet = wb.addWorksheet(company.substring(0, 31).replace(/[\[\]\*\?\/\\]/g, ""));
            
            sheet.columns = [
                { header: 'Booking_Date', key: 'h_date', width: 15 },
                { header: 'Shipper_Ref', key: 'h_ref', width: 15 },
                { header: 'ID', key: 'h_id', width: 15 },
                { header: 'Customer', key: 'h_cust', width: 25 },
                { header: 'To_Location', key: 'h_addr', width: 35 },
                { header: 'Delivery_Distance', key: 'h_dist', width: 15 },
                { header: 'Delivery_Weight', key: 'h_weight', width: 15 },
                { header: 'Grouped_invoice', key: 'h_ginv', width: 30 },
                { header: 'Grouped_trip', key: 'h_gtrip', width: 30 },
                { header: 'Confidence', key: 'h_conf', width: 12 },
                { header: 'Reasoning', key: 'h_reas', width: 50 }
            ];

            const coData = groupedResults.filter(g => g._driverAddr === company);
            const d_le = coData.filter(r => !r._isIBT && r._dist <= 150);
            const d_gt = coData.filter(r => !r._isIBT && r._dist > 150);
            const i_le = coData.filter(r => r._isIBT && r._dist <= 150);
            const i_gt = coData.filter(r => r._isIBT && r._dist > 150);

            const mapRow = (r) => ({
                h_date: r._shortDate,
                h_ref: r._internalID,
                h_id: r._tripID,
                h_cust: r._customer,
                h_addr: r._address,
                h_dist: r._dist,
                h_weight: r.totalW,
                h_ginv: r.subInvoices.length > 0 ? r.subInvoices.join(' // ') : "",
                h_gtrip: r.subTrips.length > 0 ? r.subTrips.join(' // ') : "",
                h_conf: (r.confValue * 100) + "%",
                h_reas: r.reason
            });

            [d_le, d_gt, [{}], i_le, i_gt].forEach(subset => {
                subset.forEach(r => {
                    if (r._internalID) sheet.addRow(mapRow(r));
                    else sheet.addRow({});
                });
            });

            sheet.getRow(1).font = { bold: true };
        }

        const buffer = await wb.xlsx.writeBuffer();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([buffer]));
        a.download = `Logistics_Output_Final.xlsx`;
        a.click();
        log("Process Complete!");
        processBtn.disabled = false;
    };

    document.getElementById('templateBtn').onclick = async () => {
        const wb = new ExcelJS.Workbook();
        const sheet = wb.addWorksheet('Manifest Template');

        sheet.columns = [
            { header: 'Booking_Date', key: 'a' },
            { header: 'Shipper_Ref', key: 'b' },
            { header: 'ID', key: 'c' },
            { header: 'Customer', key: 'd' },
            { header: 'To_Location', key: 'e' },
            { header: 'Delivery_Distance', key: 'f' },
            { header: 'Delivery_Weight', key: 'g' },
            { header: 'Sending_Store', key: 'h' },
            { header: 'Receiving_Store', key: 'i' },
            { header: 'Driver_Address', key: 'j' }
        ];

        sheet.addRow({
            a: new Date().toISOString().split('T')[0],
            b: '2100000001',
            c: '300001',
            d: 'Sample Customer',
            e: '123 Delivery Lane, Cape Town',
            f: 10.5,
            g: 2.5,
            h: 'C526',
            i: '',
            j: 'Company name'
        });

        sheet.getRow(1).font = { bold: true };

        const buffer = await wb.xlsx.writeBuffer();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([buffer]));
        a.download = `Upload_Template.xlsx`;
        a.click();
    };
</script>
    <footer class="py-2 bg-dark fixed-bottom">
  <div class="container-fluid px-4">
    <div class="d-flex justify-content-end align-items-center">
      <span class="text-bright  small">
        &copy; 2026 GlitchedDesigns. All rights reserved.
      </span>
    </div>
  </div>
</footer>
</body>
</html>
