<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Initializing | Secondary Utility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d23;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --border: #2d333b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Back Button Style Consistency */
        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text-dim);
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.5rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease-in-out;
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--text-main);
            transform: translateX(-2px);
        }

        .content {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
        }

        .status-code {
            font-family: 'Fira Code', monospace;
            color: var(--accent);
            font-size: 0.8rem;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* Progress Bar Container */
        .progress-container {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Loading Bar */
        .progress-bar {
            position: absolute;
            height: 100%;
            background: var(--accent);
            width: 40%;
            animation: slide 2s infinite ease-in-out;
            border-radius: 2px;
        }

        @keyframes slide {
            0% { left: -40%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .metadata {
            margin-top: 1.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: #4ade80; /* Success green for "active" feeling */
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span>Dashboard</span>
    </a>

    <div class="content">
        <div class="status-code">ERR_MODULE_OFFLINE // 503</div>
        <h1>Store - Delivery Grouping</h1>
        <p>Under Construction...</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        
    </div>

</body>
</html>
